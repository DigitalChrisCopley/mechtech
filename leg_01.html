	/* Base Datapad Styling */
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #050a05;
    color: #39ff14; /* Classic neon green */
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
}

.datapad-container {
    width: 360px;
    height: 640px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    box-sizing: border-box;
    border: 4px solid #102010;
    position: relative;
}

/* CRT Screen Scanline Overlay */
.scanlines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    background-size: 100% 4px, 6px 100%;
    pointer-events: none;
    z-index: 10;
}

/* Header */
.datapad-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    border-bottom: 2px solid #39ff14;
    padding-bottom: 5px;
}

.status-blink {
    animation: blink 1s infinite;
}

/* Data Blocks */
.content-area {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding-top: 20px;
}

.data-block {
    border: 1px solid #1a331a;
    background-color: rgba(5, 15, 5, 0.5);
    padding: 15px;
}

.section-title {
    font-size: 0.8rem;
    margin-top: 0;
    border-bottom: 1px dashed #39ff14;
    padding-bottom: 5px;
}

.data-list {
    list-style: none;
    padding: 0;
}

.data-list li {
    margin-bottom: 5px;
}

.data-list span {
    color: #8aff8a;
}

/* Progress Bar */
.progress-bar-container {
    width: 100%;
    height: 15px;
    border: 1px solid #39ff14;
    background-color: #0a150a;
    padding: 2px;
}

.progress-fill {
    width: 65%;
    height: 100%;
    background-color: #39ff14;
    animation: loading 3s infinite linear;
}

.data-text {
    font-size: 0.65rem;
    margin-top: 5px;
}

/* Grid Placeholder (Sensor/Map) */
.matrix-grid {
    display: flex;
    flex-direction: column;
}

.grid-placeholder {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 10px;
}

.grid-node {
    width: 30px;
    height: 30px;
    border: 1px solid #1a331a;
    background-color: #0a150a;
}

.grid-node.active {
    background-color: #39ff14;
    box-shadow: 0 0 10px #39ff14;
}

/* Footer / Input */
.datapad-footer {
    border-top: 2px solid #39ff14;
    padding-top: 10px;
    font-size: 0.8rem;
}

/* Keyframe Animations */
@keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
}

@keyframes loading {
    0% { width: 0%; }
    100% { width: 100%; }
}

.blink {
    animation: blink 0.8s infinite;
}

.cursor {
    animation: blink 0.6s infinite;
}

	</style>
