<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Datapad Interface</title>
    <style>
	@font-face {
	font-family: 'aurabesh';
	src: url('aurabesh.ttf') format('truetype');
	}
		
	* {
	font-family: aurabesh;
	}
	
	
	/* Base Datapad Styling */
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #050a05;
    color: #39ff14; /* Classic neon green */
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
}

.datapad-container {
    width: 360px;
    height: 640px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    box-sizing: border-box;
    border: 4px solid #102010;
    position: relative;
}

/* CRT Screen Scanline Overlay */
.scanlines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    background-size: 100% 4px, 6px 100%;
    pointer-events: none;
    z-index: 10;
}

/* Header */
.datapad-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    border-bottom: 2px solid #39ff14;
    padding-bottom: 5px;
}

.status-blink {
    animation: blink 1s infinite;
}

/* Data Blocks */
.content-area {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding-top: 20px;
}

.data-block {
    border: 1px solid #1a331a;
    background-color: rgba(5, 15, 5, 0.5);
    padding: 15px;
}

.section-title {
    font-size: 0.8rem;
    margin-top: 0;
    border-bottom: 1px dashed #39ff14;
    padding-bottom: 5px;
}

.data-list {
    list-style: none;
    padding: 0;
}

.data-list li {
    margin-bottom: 5px;
}

.data-list span {
    color: #8aff8a;
}

/* Progress Bar */
.progress-bar-container {
    width: 100%;
    height: 15px;
    border: 1px solid #39ff14;
    background-color: #0a150a;
    padding: 2px;
}

.progress-fill {
    width: 65%;
    height: 100%;
    background-color: #39ff14;
    animation: loading 3s infinite linear;
}

.data-text {
    font-size: 0.65rem;
    margin-top: 5px;
}

/* Grid Placeholder (Sensor/Map) */
.matrix-grid {
    display: flex;
    flex-direction: column;
}

.grid-placeholder {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 10px;
}

.grid-node {
    width: 30px;
    height: 30px;
    border: 1px solid #1a331a;
    background-color: #0a150a;
}

.grid-node.active {
    background-color: #39ff14;
    box-shadow: 0 0 10px #39ff14;
}

/* Footer / Input */
.datapad-footer {
    border-top: 2px solid #39ff14;
    padding-top: 10px;
    font-size: 0.8rem;
}

/* Keyframe Animations */
@keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
}

@keyframes loading {
    0% { width: 0%; }
    100% { width: 100%; }
}

.blink {
    animation: blink 0.8s infinite;
}

.cursor {
    animation: blink 0.6s infinite;
}

	</style>
<body>
    <div class="datapad-container">
        <!-- Scanline Effect -->
        <div class="scanlines"></div>

        <!-- Header / Status Bar -->
        <header class="datapad-header">
            <span class="status-blink">SYS_ONLINE</span>
            <span class="location">SEC: A-794</span>
            <span class="battery">PWR: 84%</span>
        </header>

        <!-- Main Content -->
        <main class="content-area">
            <div class="data-block">
                <h2 class="section-title">CARGO MANIFEST</h2>
                <ul class="data-list">
                    <li><span>UNIT:</span> T-14 HYPERDRIVE</li>
                    <li><span>ORIGIN:</span> KUAT DRIVE YARDS</li>
                    <li><span>STATUS:</span> ENCRYPTED</li>
                </ul>
            </div>

            <div class="data-block">
                <h2 class="section-title">DATA TRANSFER</h2>
                <div class="progress-bar-container">
                    <div class="progress-fill"></div>
                </div>
                <p class="data-text">DOWNLOADING SCHEMATICS <span class="blink">_</span></p>
            </div>

            <div class="data-block matrix-grid">
                <h2 class="section-title">GRID COORDINATES</h2>
                <div class="grid-placeholder">
                    <div class="grid-node active"></div>
                    <div class="grid-node"></div>
                    <div class="grid-node active"></div>
                    <div class="grid-node active"></div>
                    <div class="grid-node"></div>
                    <div class="grid-node active"></div>
                </div>
            </div>
        </main>

        <!-- Footer / Prompt -->
        <footer class="datapad-footer">
            <p>> ENTER SECURITY KEY: <span class="cursor">█</span></p>
        </footer>
    </div>
</body>
</html>
